# Stereo Camera Configuration for OceanSim
# This file contains extrinsic and intrinsic parameters for the stereo camera
# mounted on the robot (rob).

stereo_camera:
  # ========== EXTRINSIC PARAMETERS (Camera to Robot Transformation) ==========
  # These parameters define the position and orientation of the stereo camera
  # relative to the robot's body frame.

  # Translation offset in robot's local frame (x, y, z) in meters
  # X: Forward (positive) / Backward (negative)
  # Y: Left (positive) / Right (negative)
  # Z: Up (positive) / Down (negative)
  #
  # Default: Front of robot, slightly above center
  # Example values for different mounting positions:
  #   - Front mounting: [0.3, 0.0, 0.1]
  #   - Top mounting: [0.0, 0.0, 0.2]
  #   - Bottom mounting (looking down): [0.0, 0.0, -0.1]
  translation: [0.3, 0.0, 0.1]

  # Orientation as quaternion (w, x, y, z) in robot's local frame
  # Default: Identity quaternion (no rotation, facing forward)
  # Common orientations:
  #   - Forward: [1.0, 0.0, 0.0, 0.0]
  #   - Downward (pitch -90°): [0.707, 0.0, 0.0, -0.707]
  #   - Upward (pitch +90°): [0.707, 0.0, 0.0, 0.707]
  #   - Left (yaw +90°): [0.707, 0.0, 0.707, 0.0]
  #   - Right (yaw -90°): [0.707, 0.0, -0.707, 0.0]
  orientation: [1.0, 0.0, 0.0, 0.0]

  # ========== STEREO PARAMETERS ==========
  # Camera baseline (distance between left and right camera centers) in meters
  # Typical values:
  #   - Narrow baseline (0.05-0.1m): For close-range inspection
  #   - Medium baseline (0.1-0.2m): General purpose underwater robotics
  #   - Wide baseline (0.2-0.3m): Longer range depth estimation
  baseline: 0.12

  # ========== INTRINSIC PARAMETERS ==========
  # Camera intrinsic parameters
  focal_length: 2.1  # Focal length in mm

  # Resolution (width, height) in pixels
  resolution: [1920, 1080]

  # Update frequency in Hz (None for automatic)
  frequency: 30

  # Clipping range (near, far) in meters
  clipping_range: [0.1, 100.0]

  # ========== ROS2 CONFIGURATION ==========
  ros2:
    enable: true
    base_topic: "/oceansim/robot/stereo"
    publish_frequency: 5  # Hz
    jpeg_quality: 50      # JPEG compression quality (0-100)

  # ========== VIEWPORT VISUALIZATION ==========
  viewport:
    enable: true

  # ========== DATA RECORDING ==========
  recording:
    directory: null  # Set to path to enable recording, e.g., "/path/to/recordings"
    format: "png"
